# 管理后台前端 - http://49.235.120.3:8081
server {
    listen 8081;
    server_name _;

    root /opt/music-website/app/music-manage;
    index index.html;

    # 前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端
    location ~ ^/(admin|user|collection|comment|singer|song|songList|listSong|img|demandEvaluation|ai|excle) {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50m;
    }
}
